{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow">

            <div class="card-header bg-success text-white text-center py-4">
                <h4 class="mb-0"><i class="bi bi-box-arrow-right me-2"></i>Logout Karein</h4>
            </div>

            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-person-circle text-success" style="font-size: 4rem;"></i>
                </div>
                <h5 class="fw-semibold mb-2">Kya aap sure hain?</h5>
                <p class="text-muted mb-4">
                    Hi <strong>{{ user.username }}</strong>, kya aap account se logout hona chahty han?
                </p>

                <form method="POST" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success py-2 fw-semibold">
                            <i class="bi bi-box-arrow-right me-2"></i>Haan, Logout Karein
                        </button>
                        <a href="/" class="btn btn-outline-secondary py-2">
                            <i class="bi bi-arrow-left me-2"></i>Wapas Jaayein
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

{% endblock %}
