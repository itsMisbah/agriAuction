{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow">

            <div class="card-header bg-success text-white text-center py-4">
                <h4 class="mb-0"><i class="bi bi-check-circle me-2"></i>Password Reset Ho Gaya!</h4>
            </div>

            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-unlock text-success" style="font-size: 4rem;"></i>
                </div>
                <h5 class="fw-semibold mb-3">Mubarak Ho! 🎉</h5>
                <p class="text-muted mb-4">
                    Aapka password successfully reset ho gaya hai.<br>
                    Ab aap naye password se login kar sakte hain.
                </p>
                <a href="{% url 'account_login' %}" class="btn btn-success w-100 py-2 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login Karein
                </a>
            </div>

        </div>
    </div>
</div>

{% endblock %}
