{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow">

            <div class="card-header bg-success text-white text-center py-4">
                <h4 class="mb-0"><i class="bi bi-key me-2"></i>Password Reset Karein</h4>
            </div>

            <div class="card-body p-4">
                <p class="text-muted mb-4 text-center">
                    Apni registered email likhein — hum aapko password reset link bhejenge.
                </p>

                <form method="POST" action="">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold d-block">
                            <i class="bi bi-envelope me-1"></i>Email Address
                        </label>
                        {{ form.email }}
                        {% if form.email.errors %}
                            <div class="text-danger small mt-1">{{ form.email.errors }}</div>
                        {% endif %}
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">
                        <i class="bi bi-send me-2"></i>Reset Link Bhejein
                    </button>
                </form>
            </div>

            <div class="card-footer bg-white text-center py-3">
                <small class="text-muted">
                    Password yaad aa gaya?
                    <a href="{% url 'account_login' %}" class="text-success fw-semibold text-decoration-none">Login karein</a>
                </small>
            </div>

        </div>
    </div>
</div>

<script>
    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.classList.add('form-control', 'mt-1');
    });
</script>

{% endblock %}
