{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow">

            <div class="card-header bg-success text-white text-center py-4">
                <h4 class="mb-0"><i class="bi bi-envelope-check me-2"></i>Reset Link Bhej Di!</h4>
            </div>

            <div class="card-body p-4 text-center">
                <div class="mb-4">
                    <i class="bi bi-send-check text-success" style="font-size: 4rem;"></i>
                </div>
                <h5 class="fw-semibold mb-3">Email Check Karein</h5>
                <p class="text-muted mb-4">
                    Agar ye email hamare system mein registered hai toh<br>
                    aapko password reset link mil jaayegi.
                </p>
                <div class="alert alert-warning text-start small">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    Email nahi mili? <strong>Spam/Junk</strong> folder check karein.
                </div>
            </div>

            <div class="card-footer bg-white text-center py-3">
                <small class="text-muted">
                    <a href="{% url 'account_login' %}" class="text-success fw-semibold text-decoration-none">
                        Login page pe jaayein
                    </a>
                </small>
            </div>

        </div>
    </div>
</div>

{% endblock %}
